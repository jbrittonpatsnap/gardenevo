<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Garden Time-Lapse</title>
<style>
  :root { --green:#16a34a; --green-d:#15803d; --amber:#f59e0b; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:linear-gradient(#f0fdf4,#ecfdf5); color:#14532d; }
  .wrap { max-width:460px; margin:0 auto; padding:18px 16px 40px; }
  .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .head .t { display:flex; align-items:center; gap:8px; }
  .badge { width:36px; height:36px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; }
  h1 { font-size:18px; margin:0; line-height:1.1; }
  .sub { font-size:12px; color:#16a34a; margin-top:2px; }
  #stage { position:relative; width:100%; aspect-ratio:3/4; background:#000; border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.18); }
  #stage.align { cursor:crosshair; outline:2px solid var(--amber); outline-offset:-2px; }
  .frame { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; user-select:none; -webkit-user-drag:none; }
  .lbl { position:absolute; left:0; right:0; bottom:0; padding:12px; z-index:30; pointer-events:none;
         background:linear-gradient(transparent,rgba(0,0,0,.72)); color:#fff; font-weight:600; font-size:14px; }
  .hint { position:absolute; left:0; right:0; top:0; z-index:30; pointer-events:none; text-align:center;
          background:rgba(245,158,11,.92); color:#fff; font-size:12px; padding:6px 10px; }
  .cross { position:absolute; z-index:20; width:20px; height:20px; margin:-10px 0 0 -10px; border:2px solid var(--amber); border-radius:50%; pointer-events:none; }
  .cross:before,.cross:after { content:""; position:absolute; left:50%; top:50%; background:var(--amber); }
  .cross:before { width:1px; height:12px; transform:translate(-50%,-50%); }
  .cross:after { width:12px; height:1px; transform:translate(-50%,-50%); }
  .row { display:flex; align-items:center; gap:12px; margin-top:12px; }
  .play { flex:0 0 auto; width:44px; height:44px; border:0; border-radius:50%; background:var(--green); color:#fff; font-size:18px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.15); }
  input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:8px; background:#bbf7d0; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--green); cursor:pointer; }
  input[type=range]::-moz-range-thumb { width:18px; height:18px; border:0; border-radius:50%; background:var(--green); cursor:pointer; }
  .count { flex:0 0 auto; min-width:42px; text-align:right; font-size:12px; font-weight:700; color:var(--green-d); }
  .meta { display:flex; flex-wrap:wrap; justify-content:space-between; gap:8px; margin-top:8px; font-size:12px; color:var(--green-d); }
  .meta .g { display:flex; align-items:center; gap:8px; }
  .seg { padding:4px 10px; border-radius:999px; border:1px solid #86efac; background:#fff; color:var(--green-d); font-weight:600; cursor:pointer; }
  .seg.on { background:var(--green); color:#fff; border-color:var(--green); }
  .panel { margin-top:16px; border:1px solid #bbf7d0; background:#fff; border-radius:12px; padding:12px; }
  .btn { border:0; border-radius:999px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; }
  .btn-amber { background:var(--amber); color:#fff; }
  .btn-green { background:var(--green); color:#fff; }
  .btn-ghost { border:1px solid #d1d5db; background:#fff; color:#374151; }
  .btn-ghost.on { border-color:#86efac; background:#f0fdf4; color:var(--green-d); }
  .tools { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .zoom { display:inline-flex; align-items:center; gap:4px; border:1px solid #d1d5db; border-radius:999px; padding:2px 8px; background:#fff; }
  .zoom button { border:0; background:none; font-size:15px; cursor:pointer; padding:2px 6px; color:#374151; }
  .tip { margin:8px 0 0; font-size:12px; color:#6b7280; line-height:1.5; }
  .strip { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-top:8px; }
  .cell { flex:0 0 auto; width:120px; border:1px solid #e5e7eb; background:#fff; border-radius:10px; padding:6px; }
  .cell.sel { border-color:var(--green); background:#f0fdf4; }
  .thumb { position:relative; width:100%; height:72px; border-radius:6px; overflow:hidden; background:#e5e7eb; cursor:pointer; border:0; padding:0; display:block; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .num { position:absolute; left:4px; top:4px; background:rgba(0,0,0,.6); color:#fff; font-size:10px; font-weight:700; padding:0 4px; border-radius:3px; }
  .cell input { width:100%; margin-top:6px; font-size:11px; padding:3px 5px; border:1px solid #e5e7eb; border-radius:5px; color:#374151; }
  .lbltitle { font-size:12px; font-weight:600; color:var(--green-d); margin-top:16px; }
</style>

<div class="wrap">
  <div class="head">
    <div class="t">
      <div class="badge">&#127793;</div>
      <div><h1>Garden Time-Lapse</h1><div class="sub" id="sub"></div></div>
    </div>
  </div>

  <div id="stage">
    <div class="lbl" id="lbl"></div>
    <div class="hint" id="hint" style="display:none"></div>
    <div class="cross" id="cross" style="display:none"></div>
  </div>

  <div class="row">
    <button class="play" id="play">&#9654;</button>
    <input type="range" id="scrub" min="0" value="0">
    <span class="count" id="count"></span>
  </div>

  <div class="meta">
    <div class="g"><span>Speed</span><input type="range" id="speed" min="300" max="2400" step="100" style="width:120px"><span id="spd"></span></div>
    <div class="g"><span>Frame</span><button class="seg on" id="a34">3:4</button><button class="seg" id="a916">9:16</button></div>
  </div>

  <div class="panel">
    <div class="tools">
      <button class="btn btn-amber" id="alignBtn">&#9678; Align photos</button>
      <button class="btn btn-ghost on" id="onionBtn" style="display:none">&#9783; Ghost overlay</button>
      <span class="zoom" id="zoomBox" style="display:none"><button id="zout">&#8722;</button><span id="zval">100%</span><button id="zin">+</button></span>
      <button class="btn btn-ghost" id="resetBtn" style="display:none">&#8635; Reset</button>
    </div>
    <p class="tip" id="tip" style="display:none">Click the same landmark in every photo to register them. Fine-tune with arrow keys (hold Shift for bigger steps); use zoom to match wider shots. Your alignment is saved in this browser.</p>
  </div>

  <div class="lbltitle">Photos &amp; labels</div>
  <div class="strip" id="strip"></div>
</div>

<script>
(function(){
  var BASE = "./";
  var IMAGES = [
    {file:"Screenshot 2026-06-15 151254.png", label:"Winter — overgrown start"},
    {file:"Screenshot 2026-06-15 151303.png", label:"Spring clear-out"},
    {file:"Screenshot 2026-06-15 151310.png", label:"Beds cleared"},
    {file:"Screenshot 2026-06-15 151320.png", label:"First summer blooms"},
    {file:"Screenshot 2026-06-15 151328.png", label:"Roses in bloom"},
    {file:"Screenshot 2026-06-15 151337.png", label:"Beds dug over"},
    {file:"Screenshot 2026-06-15 151347.png", label:"Landscaping begins"},
    {file:"Screenshot 2026-06-15 151400.png", label:"New path edging"},
    {file:"Screenshot 2026-06-15 151413.png", label:"Finished"}
  ];
  var KEY = "gardenevo-v1";

  // persisted state (alignment + labels), guarded so it never breaks
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ saved = {}; }
  saved.tf = saved.tf || {};
  saved.labels = saved.labels || {};
  function save(){ try { localStorage.setItem(KEY, JSON.stringify(saved)); } catch(e){} }

  IMAGES.forEach(function(im){
    if (saved.labels[im.file]) im.label = saved.labels[im.file];
    if (!saved.tf[im.file]) saved.tf[im.file] = {dx:0,dy:0,s:1};
  });

  var st = { sel:0, align:false, onion:true, target:null, aspect:"3 / 4", speed:900, playing:false, timer:null };

  var stage=document.getElementById("stage"), lbl=document.getElementById("lbl"),
      hint=document.getElementById("hint"), cross=document.getElementById("cross"),
      play=document.getElementById("play"), scrub=document.getElementById("scrub"),
      count=document.getElementById("count"), speed=document.getElementById("speed"),
      spd=document.getElementById("spd"), strip=document.getElementById("strip"),
      sub=document.getElementById("sub"), tip=document.getElementById("tip"),
      alignBtn=document.getElementById("alignBtn"), onionBtn=document.getElementById("onionBtn"),
      zoomBox=document.getElementById("zoomBox"), zval=document.getElementById("zval"),
      resetBtn=document.getElementById("resetBtn");

  // build frame images
  var frames = IMAGES.map(function(im){
    var img=document.createElement("img");
    img.className="frame"; img.alt=im.label; img.draggable=false;
    img.src=BASE+encodeURI(im.file);
    stage.insertBefore(img, lbl);
    return img;
  });

  scrub.max=IMAGES.length-1;
  speed.value=2700-st.speed;
  sub.textContent=IMAGES.length+" photos · a year of growth";

  function tf(i){ return saved.tf[IMAGES[i].file]; }

  function render(){
    stage.style.aspectRatio=st.aspect;
    stage.className = st.align ? "align" : "";
    frames.forEach(function(img,i){
      var t=tf(i);
      img.style.transform="translate("+t.dx+"px,"+t.dy+"px) scale("+t.s+")";
      if(st.align){
        var show = i===st.sel || (st.onion && i===st.sel-1);
        img.style.display = show ? "block" : "none";
        img.style.opacity = i===st.sel ? 1 : .4;
        img.style.zIndex = i===st.sel ? 2 : 1;
        img.style.transition="none";
      } else {
        img.style.display="block";
        img.style.opacity = i===st.sel ? 1 : 0;
        img.style.zIndex = i===st.sel ? 2 : 1;
        img.style.transition="opacity .65s ease-in-out";
      }
    });
    lbl.style.display = st.align ? "none" : "block";
    lbl.textContent = IMAGES[st.sel].label;
    hint.style.display = st.align ? "block" : "none";
    hint.textContent = !st.target ? "Click a fixed landmark (the archway keystone works well) to set the reference point"
                                   : "Click the same landmark in photo "+(st.sel+1)+" to snap it into place";
    cross.style.display = (st.align && st.target) ? "block" : "none";
    if(st.target){ cross.style.left=st.target.x+"px"; cross.style.top=st.target.y+"px"; }
    count.textContent=(st.sel+1)+"/"+IMAGES.length;
    scrub.value=st.sel;
    spd.textContent=(st.speed/1000).toFixed(1)+"s";
    zval.textContent=Math.round(tf(st.sel).s*100)+"%";
    Array.prototype.forEach.call(strip.children,function(c,i){ c.className = "cell"+(i===st.sel?" sel":""); });
  }

  // playback
  function setPlaying(p){
    st.playing=p; play.innerHTML = p ? "&#10073;&#10073;" : "&#9654;";
    if(st.timer){ clearInterval(st.timer); st.timer=null; }
    if(p){ st.timer=setInterval(function(){ st.sel=(st.sel+1)%IMAGES.length; render(); }, st.speed); }
  }
  play.onclick=function(){ if(st.align) return; setPlaying(!st.playing); };
  scrub.oninput=function(){ setPlaying(false); st.sel=+scrub.value; render(); };
  speed.oninput=function(){ st.speed=2700-(+speed.value); if(st.playing) setPlaying(true); render(); };

  document.getElementById("a34").onclick=function(){ st.aspect="3 / 4"; this.classList.add("on"); document.getElementById("a916").classList.remove("on"); render(); };
  document.getElementById("a916").onclick=function(){ st.aspect="9 / 16"; this.classList.add("on"); document.getElementById("a34").classList.remove("on"); render(); };

  // align
  function setAlign(on){
    st.align=on; setPlaying(false);
    alignBtn.textContent = on ? "Done aligning" : "\u25CE Align photos";
    alignBtn.className = "btn "+(on?"btn-green":"btn-amber");
    [onionBtn,zoomBox,resetBtn].forEach(function(el){ el.style.display = on?"":"none"; });
    tip.style.display = on?"block":"none";
    if(!on) st.target=null;
    render();
  }
  alignBtn.onclick=function(){ setAlign(!st.align); };
  onionBtn.onclick=function(){ st.onion=!st.onion; onionBtn.classList.toggle("on",st.onion); render(); };
  resetBtn.onclick=function(){ IMAGES.forEach(function(im){ saved.tf[im.file]={dx:0,dy:0,s:1}; }); st.target=null; st.sel=0; save(); render(); };
  document.getElementById("zin").onclick=function(){ var t=tf(st.sel); t.s=Math.min(2.5,+(t.s+0.02).toFixed(3)); save(); render(); };
  document.getElementById("zout").onclick=function(){ var t=tf(st.sel); t.s=Math.max(0.4,+(t.s-0.02).toFixed(3)); save(); render(); };

  stage.onclick=function(e){
    if(!st.align) return;
    var r=stage.getBoundingClientRect();
    var x=e.clientX-r.left, y=e.clientY-r.top;
    if(!st.target){ st.target={x:x,y:y}; }
    else { var t=tf(st.sel); t.dx+=st.target.x-x; t.dy+=st.target.y-y; save(); }
    if(st.sel<IMAGES.length-1) st.sel++;
    render();
  };

  window.addEventListener("keydown",function(e){
    if(!st.align) return;
    var step=e.shiftKey?10:1, t=tf(st.sel), d=false;
    if(e.key==="ArrowLeft"){ t.dx-=step; d=true; }
    else if(e.key==="ArrowRight"){ t.dx+=step; d=true; }
    else if(e.key==="ArrowUp"){ t.dy-=step; d=true; }
    else if(e.key==="ArrowDown"){ t.dy+=step; d=true; }
    if(d){ e.preventDefault(); save(); render(); }
  });

  // filmstrip
  IMAGES.forEach(function(im,i){
    var cell=document.createElement("div"); cell.className="cell";
    var btn=document.createElement("button"); btn.className="thumb";
    var t=document.createElement("img"); t.src=BASE+encodeURI(im.file); t.alt=im.label;
    var num=document.createElement("span"); num.className="num"; num.textContent=i+1;
    btn.appendChild(t); btn.appendChild(num);
    btn.onclick=function(){ setPlaying(false); st.sel=i; render(); };
    var inp=document.createElement("input"); inp.value=im.label;
    inp.oninput=function(){ im.label=inp.value; saved.labels[im.file]=inp.value; save(); if(i===st.sel) lbl.textContent=inp.value; };
    cell.appendChild(btn); cell.appendChild(inp);
    strip.appendChild(cell);
  });

  render();
})();
</script>
