<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Garden Time-Lapse</title>
<style>
  :root { --green:#16a34a; --green-d:#15803d; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:linear-gradient(#f0fdf4,#ecfdf5); color:#14532d; }
  .wrap { max-width:480px; margin:0 auto; padding:18px 16px 40px; }
  .head { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .badge { width:36px; height:36px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; }
  h1 { font-size:18px; margin:0; line-height:1.1; }
  .sub { font-size:12px; color:#16a34a; margin-top:2px; }
  .modes { display:flex; gap:6px; margin-bottom:12px; }
  .mode { flex:1; padding:8px; border:1px solid #86efac; background:#fff; color:var(--green-d); font-weight:600; border-radius:10px; cursor:pointer; font-size:14px; }
  .mode.on { background:var(--green); color:#fff; border-color:var(--green); }
  .stage { position:relative; width:100%; aspect-ratio:3/4; background:#000; border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.18); }
  .frame { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; user-select:none; -webkit-user-drag:none; }
  .lbl { position:absolute; left:0; right:0; bottom:0; padding:12px; z-index:5; pointer-events:none;
         background:linear-gradient(transparent,rgba(0,0,0,.72)); color:#fff; font-weight:600; font-size:14px; }
  .row { display:flex; align-items:center; gap:12px; margin-top:12px; }
  .play { flex:0 0 auto; width:44px; height:44px; border:0; border-radius:50%; background:var(--green); color:#fff; font-size:18px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.15); }
  input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:8px; background:#bbf7d0; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--green); cursor:pointer; }
  input[type=range]::-moz-range-thumb { width:18px; height:18px; border:0; border-radius:50%; background:var(--green); cursor:pointer; }
  .count { flex:0 0 auto; min-width:42px; text-align:right; font-size:12px; font-weight:700; color:var(--green-d); }
  .meta { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:12px; color:var(--green-d); }
  .strip { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-top:14px; }
  .thumb { position:relative; flex:0 0 auto; width:84px; height:62px; border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer; padding:0; background:#e5e7eb; }
  .thumb.sel { border-color:var(--green); }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb span { position:absolute; left:3px; top:3px; background:rgba(0,0,0,.6); color:#fff; font-size:10px; font-weight:700; padding:0 4px; border-radius:3px; }
  /* compare */
  .pickers { display:flex; gap:10px; margin-bottom:10px; }
  .pickers label { flex:1; font-size:12px; color:var(--green-d); font-weight:600; }
  .pickers select { width:100%; margin-top:3px; padding:6px; border:1px solid #86efac; border-radius:8px; font-size:13px; background:#fff; }
  .ba { position:relative; width:100%; aspect-ratio:3/4; background:#000; border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.18); touch-action:none; cursor:ew-resize; }
  .ba img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; user-select:none; -webkit-user-drag:none; pointer-events:none; }
  .ba .tag { position:absolute; top:10px; z-index:6; font-size:12px; font-weight:600; color:#fff; background:rgba(0,0,0,.55); padding:3px 8px; border-radius:999px; pointer-events:none; }
  .ba .tagL { left:10px; } .ba .tagR { right:10px; }
  .divider { position:absolute; top:0; bottom:0; width:2px; background:#fff; z-index:7; pointer-events:none; box-shadow:0 0 6px rgba(0,0,0,.4); }
  .knob { position:absolute; top:50%; left:50%; width:34px; height:34px; transform:translate(-50%,-50%); background:#fff; border-radius:50%; box-shadow:0 2px 8px rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; color:var(--green-d); font-size:14px; font-weight:700; pointer-events:none; }
  .hidden { display:none; }
  .note { font-size:11px; color:#6b7280; margin-top:10px; line-height:1.5; }
</style>

<div class="wrap">
  <div class="head">
    <div class="badge">&#127793;</div>
    <div><h1>Garden Time-Lapse</h1><div class="sub" id="sub"></div></div>
  </div>

  <div class="modes">
    <button class="mode" id="mPlay">&#9654; Play</button>
    <button class="mode on" id="mCompare">&#8596; Compare</button>
  </div>

  <!-- PLAY -->
  <div id="playPanel" class="hidden">
    <div class="stage" id="stage"><div class="lbl" id="lbl"></div></div>
    <div class="row">
      <button class="play" id="play">&#9654;</button>
      <input type="range" id="scrub" min="0" value="0">
      <span class="count" id="count"></span>
    </div>
    <div class="meta"><span>Speed</span>
      <input type="range" id="speed" min="300" max="2400" step="100" style="max-width:160px">
      <span id="spd"></span>
    </div>
    <div class="strip" id="strip"></div>
  </div>

  <!-- COMPARE -->
  <div id="comparePanel">
    <div class="pickers">
      <label>Left (before)<select id="selL"></select></label>
      <label>Right (after)<select id="selR"></select></label>
    </div>
    <div class="ba" id="ba">
      <img id="imgR" alt="after">
      <img id="imgL" alt="before">
      <div class="tag tagL" id="tagL"></div>
      <div class="tag tagR" id="tagR"></div>
      <div class="divider" id="divider"><div class="knob">&#8596;</div></div>
    </div>
    <p class="note">Drag the handle left/right to wipe between the two photos. Because the images are aligned, the path and archway stay put while everything else transforms.</p>
  </div>
</div>

<script>
(function(){
  var BASE = "./";
  var LABELS = ["Winter — overgrown start","Spring clear-out","Beds cleared",
    "First summer blooms","Roses in bloom","Beds dug over","Landscaping begins",
    "New path edging","Finished"];
  var IMAGES = LABELS.map(function(label,i){
    return { file:(i+1<10?"0":"")+(i+1)+".jpg", label:label };
  });

  var $ = function(id){ return document.getElementById(id); };
  $("sub").textContent = IMAGES.length + " photos · a year of growth";

  /* ---------- PLAY ---------- */
  var stage=$("stage"), lbl=$("lbl"), play=$("play"), scrub=$("scrub"),
      count=$("count"), speed=$("speed"), spd=$("spd"), strip=$("strip");
  var sel=0, playing=false, timer=null, spd_ms=900;

  var frames = IMAGES.map(function(im,i){
    var img=document.createElement("img");
    img.className="frame"; img.src=BASE+im.file; img.alt=im.label;
    img.style.opacity = i===0?1:0;
    img.style.transition="opacity .65s ease-in-out";
    if(i===0){ img.onload=function(){ var r=this.naturalWidth/this.naturalHeight;
      if(r){ stage.style.aspectRatio=r; $("ba").style.aspectRatio=r; } }; }
    stage.insertBefore(img, lbl);
    return img;
  });

  scrub.max=IMAGES.length-1; speed.value=2700-spd_ms;

  function showFrame(){
    frames.forEach(function(f,i){ f.style.opacity=i===sel?1:0; f.style.zIndex=i===sel?2:1; });
    lbl.textContent=IMAGES[sel].label;
    count.textContent=(sel+1)+"/"+IMAGES.length; scrub.value=sel;
    spd.textContent=(spd_ms/1000).toFixed(1)+"s";
    Array.prototype.forEach.call(strip.children,function(t,i){ t.className="thumb"+(i===sel?" sel":""); });
  }
  function setPlaying(p){
    playing=p; play.innerHTML=p?"&#10073;&#10073;":"&#9654;";
    if(timer){ clearInterval(timer); timer=null; }
    if(p){ timer=setInterval(function(){ sel=(sel+1)%IMAGES.length; showFrame(); }, spd_ms); }
  }
  play.onclick=function(){ setPlaying(!playing); };
  scrub.oninput=function(){ setPlaying(false); sel=+scrub.value; showFrame(); };
  speed.oninput=function(){ spd_ms=2700-(+speed.value); if(playing) setPlaying(true); showFrame(); };

  IMAGES.forEach(function(im,i){
    var b=document.createElement("button"); b.className="thumb";
    var t=document.createElement("img"); t.src=BASE+im.file; t.alt=im.label;
    var n=document.createElement("span"); n.textContent=i+1;
    b.appendChild(t); b.appendChild(n);
    b.onclick=function(){ setPlaying(false); sel=i; showFrame(); };
    strip.appendChild(b);
  });
  showFrame();

  /* ---------- COMPARE ---------- */
  var ba=$("ba"), imgL=$("imgL"), imgR=$("imgR"), divider=$("divider"),
      tagL=$("tagL"), tagR=$("tagR"), selL=$("selL"), selR=$("selR");
  var li=0, ri=IMAGES.length-1, pct=50;

  IMAGES.forEach(function(im,i){
    var o1=document.createElement("option"); o1.value=i; o1.textContent=(i+1)+". "+im.label; selL.appendChild(o1);
    var o2=document.createElement("option"); o2.value=i; o2.textContent=(i+1)+". "+im.label; selR.appendChild(o2);
  });
  selL.value=li; selR.value=ri;

  function setClip(){
    imgL.style.clipPath="inset(0 "+(100-pct)+"% 0 0)";
    divider.style.left=pct+"%";
  }
  function loadCompare(){
    li=+selL.value; ri=+selR.value;
    imgL.src=BASE+IMAGES[li].file; imgR.src=BASE+IMAGES[ri].file;
    tagL.textContent=IMAGES[li].label; tagR.textContent=IMAGES[ri].label;
    setClip();
  }
  selL.onchange=loadCompare; selR.onchange=loadCompare;

  function moveTo(clientX){
    var r=ba.getBoundingClientRect();
    pct=Math.max(0,Math.min(100,((clientX-r.left)/r.width)*100));
    setClip();
  }
  var dragging=false;
  ba.addEventListener("pointerdown",function(e){ dragging=true; ba.setPointerCapture(e.pointerId); moveTo(e.clientX); });
  ba.addEventListener("pointermove",function(e){ if(dragging) moveTo(e.clientX); });
  ba.addEventListener("pointerup",function(){ dragging=false; });
  ba.addEventListener("pointercancel",function(){ dragging=false; });
  loadCompare();

  /* ---------- MODE TOGGLE ---------- */
  function setMode(m){
    var p=m==="play";
    $("mPlay").classList.toggle("on",p); $("mCompare").classList.toggle("on",!p);
    $("playPanel").classList.toggle("hidden",!p);
    $("comparePanel").classList.toggle("hidden",p);
    if(p===false) setPlaying(false);
  }
  $("mPlay").onclick=function(){ setMode("play"); };
  $("mCompare").onclick=function(){ setMode("compare"); };
  setMode("compare");
})();
</script>
